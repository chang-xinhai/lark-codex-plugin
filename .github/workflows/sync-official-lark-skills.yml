name: Sync official Lark skills

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: sync-official-lark-skills
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Sync from larksuite/cli
        run: python3 scripts/sync_official_lark_skills.py

      - name: Verify deterministic output
        run: |
          git add plugins/lark/skills THIRD_PARTY_NOTICES plugins/lark/.codex-plugin/plugin.json
          before="$(git diff --cached --binary | sha256sum)"
          python3 scripts/sync_official_lark_skills.py
          git add plugins/lark/skills THIRD_PARTY_NOTICES plugins/lark/.codex-plugin/plugin.json
          after="$(git diff --cached --binary | sha256sum)"
          test "$before" = "$after"

      - name: Commit changes
        run: |
          git add plugins/lark/skills THIRD_PARTY_NOTICES plugins/lark/.codex-plugin/plugin.json
          if git diff --cached --quiet; then
            echo "No upstream changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync official Lark skills"
          git pull --rebase origin main
          git push
