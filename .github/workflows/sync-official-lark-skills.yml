name: Sync official Lark skills

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Sync from larksuite/cli
        run: python3 scripts/sync_official_lark_skills.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No upstream changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/lark/skills THIRD_PARTY_NOTICES plugins/lark/.codex-plugin/plugin.json
          git commit -m "chore: sync official Lark skills"
          git push
